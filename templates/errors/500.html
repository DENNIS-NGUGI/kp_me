<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1a5632;
            --secondary-green: #2d8a4e;
            --primary-red: #b71c1c;
        }
        body {
            background: linear-gradient(135deg, #f5f7f5 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .error-icon {
            font-size: 4rem;
            color: var(--primary-red);
            margin-bottom: 20px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: var(--primary-red);
            line-height: 1;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin: 15px 0 10px;
        }
        .error-message {
            color: #6c757d;
            margin-bottom: 25px;
        }
        .btn-primary {
            background: var(--primary-green);
            border-color: var(--primary-green);
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: var(--secondary-green);
            border-color: var(--secondary-green);
        }
        .footer-text {
            color: #adb5bd;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <div class="error-code">500</div>
        <div class="error-title">Server Error</div>
        <div class="error-message">
            <p>Something went wrong on our end.</p>
            <p class="small text-muted">Please try again later or contact support if the problem persists.</p>
        </div>
        <a href="{% url 'reports:dashboard' %}" class="btn btn-primary">
            <i class="bi bi-house me-2"></i>Go to Dashboard
        </a>
        <hr class="my-3">
        <div class="footer-text">
            <i class="bi bi-c-circle me-1"></i> {% now "Y" %} Kenya Population Programme M&E System
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
