{% extends 'base.html' %}

{% block title %}Notification Preferences - KP M&E System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-bell me-2"></i>Notification Preferences
            </div>
            <div class="card-body">
                <p class="text-muted">Choose how you want to receive notifications.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <h6 class="mt-3">Email Notifications</h6>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="email_submissions" 
                                       id="email_submissions" {% if prefs.email_submissions %}checked{% endif %}>
                                <label class="form-check-label" for="email_submissions">Data Submissions</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="email_approvals" 
                                       id="email_approvals" {% if prefs.email_approvals %}checked{% endif %}>
                                <label class="form-check-label" for="email_approvals">Approvals & Rejections</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="email_deadlines" 
                                       id="email_deadlines" {% if prefs.email_deadlines %}checked{% endif %}>
                                <label class="form-check-label" for="email_deadlines">Deadline Reminders</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="email_reminders" 
                                       id="email_reminders" {% if prefs.email_reminders %}checked{% endif %}>
                                <label class="form-check-label" for="email_reminders">General Reminders</label>
                            </div>
                        </div>
                    </div>

                    <h6 class="mt-3">In-App Notifications</h6>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="in_app_submissions" 
                                       id="in_app_submissions" {% if prefs.in_app_submissions %}checked{% endif %}>
                                <label class="form-check-label" for="in_app_submissions">Data Submissions</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="in_app_approvals" 
                                       id="in_app_approvals" {% if prefs.in_app_approvals %}checked{% endif %}>
                                <label class="form-check-label" for="in_app_approvals">Approvals & Rejections</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="in_app_deadlines" 
                                       id="in_app_deadlines" {% if prefs.in_app_deadlines %}checked{% endif %}>
                                <label class="form-check-label" for="in_app_deadlines">Deadline Reminders</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="in_app_reminders" 
                                       id="in_app_reminders" {% if prefs.in_app_reminders %}checked{% endif %}>
                                <label class="form-check-label" for="in_app_reminders">General Reminders</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>Save Preferences
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
