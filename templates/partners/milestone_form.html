{% extends 'base.html' %}

{% block title %}Add Milestone - {{ project.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-check2-square me-2"></i>Add Milestone to {{ project.name }}
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Milestone Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="name" class="form-control" placeholder="e.g., Phase 1 Complete" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold">Description</label>
                        <textarea name="description" id="description" class="form-control" rows="3" 
                                  placeholder="Detailed description of the milestone"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="due_date" class="form-label fw-semibold">Due Date <span class="text-danger">*</span></label>
                        <input type="date" name="due_date" id="due_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="order" class="form-label fw-semibold">Order</label>
                        <input type="number" name="order" id="order" class="form-control" value="0" 
                               placeholder="0 = first">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle me-2"></i>Add Milestone
                        </button>
                        <a href="{% url 'partners:project_detail' project.id %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
