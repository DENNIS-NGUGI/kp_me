{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KP M&E System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1a5632;
            --secondary-green: #2d8a4e;
            --primary-red: #b71c1c;
        }
        body {
            background: linear-gradient(135deg, #f5f7f5 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            padding: 0;
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #1a5632, #2d8a4e);
            padding: 30px 40px;
            text-align: center;
            color: white;
        }
        .login-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }
        .login-header p {
            opacity: 0.8;
            margin-bottom: 0;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 30px 40px 40px;
        }
        .login-body .form-control {
            border-radius: 8px;
            padding: 12px 16px;
        }
        .login-body .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.2rem rgba(26, 86, 50, 0.25);
        }
        .login-body .btn-primary {
            background: var(--primary-green);
            border-color: var(--primary-green);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }
        .login-body .btn-primary:hover {
            background: var(--secondary-green);
            border-color: var(--secondary-green);
        }
        .login-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            margin-top: 20px;
        }
        .login-footer a {
            color: var(--primary-green);
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .logo-text {
            font-size: 2.5rem;
        }
        .alert {
            border-radius: 8px;
        }
        .captcha-container {
            text-align: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .captcha-container img {
            max-width: 200px;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-text">
                <img src="{% static 'images/coat.png' %}" alt="KP Logo" class="img-fluid mb-2" style="max-height: 50px;">
            </div>
            <h2>KP M&E System</h2>
            <p>Kenya Population Programme</p>
        </div>
        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                    <i class="bi bi-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %} me-2"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" id="loginForm">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" id="id_username" class="form-control" 
                               placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="id_password" class="form-control" 
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <!-- ===== CAPTCHA SECTION ===== -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Verification <span class="text-danger">*</span></label>
                    <div class="captcha-container">
                        <img src="{{ captcha_image }}" alt="Captcha" id="captcha_image_login">
                        <br>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="refreshCaptchaLogin()">
                            <i class="bi bi-arrow-repeat me-1"></i>Refresh
                        </button>
                    </div>
                    <input type="hidden" name="captcha_0" value="{{ captcha_key }}" id="captcha_key_login">
                    <input type="text" name="captcha_1" class="form-control mt-2" placeholder="Enter the code shown" required>
                    <small class="text-muted">Please enter the characters from the image above.</small>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <div class="login-footer">
                <p class="mb-0 text-muted">
                    <i class="bi bi-question-circle me-1"></i>Don't have an account?
                    <a href="{% url 'users:register' %}">Register here</a>
                </p>
                <p class="mb-0 mt-2 small text-muted">
                    <a href="#" class="text-muted">Forgot password?</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function refreshCaptchaLogin() {
            fetch('/captcha/refresh/')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('HTTP error ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById('captcha_key_login').value = data.key;
                    document.getElementById('captcha_image_login').src = data.image_url;
                })
                .catch(error => {
                    console.error('Error refreshing captcha:', error);
                    window.location.reload();
                });
        }
    </script>
</body>
</html>
