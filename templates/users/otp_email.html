<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f7f5; margin: 0; padding: 20px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 500px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <tr>
            <td style="padding: 20px; text-align: center; background-color: #1a5632; border-radius: 8px 8px 0 0; color: white;">
                <h1 style="margin: 0; font-size: 22px;">KP M&E System</h1>
                <p style="margin: 5px 0 0; opacity: 0.8; font-size: 14px;">Kenya Population Programme</p>
            </td>
        </tr>
        <tr>
            <td style="padding: 30px 20px; text-align: center;">
                <h2 style="color: #1a5632; margin-top: 0;">Verification Code</h2>
                <p style="color: #333; line-height: 1.6;">Hello {{ user.get_full_name|default:user.username }},</p>
                <p style="color: #333; line-height: 1.6;">Your verification code is:</p>
                <div style="font-size: 32px; font-weight: 700; color: #1a5632; letter-spacing: 5px; padding: 15px; background: #e8f5e9; border-radius: 8px; display: inline-block; margin: 15px 0;">
                    {{ otp }}
                </div>
                <p style="color: #6c757d; font-size: 12px;">This code will expire in 10 minutes.</p>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; text-align: center; border-top: 1px solid #e9ecef; color: #6c757d; font-size: 12px;">
                <p style="margin: 0;">KP M&E System &bull; National Council for Population and Development</p>
                <p style="margin: 5px 0 0;">&copy; 2026 KP M&E System</p>
            </td>
        </tr>
    </table>
</body>
</html>
