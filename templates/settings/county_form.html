{% extends 'base.html' %}

{% block title %}{% if county %}Edit{% else %}Add{% endif %} County - KP M&E System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="page-title">
                <i class="bi bi-{% if county %}pencil-square{% else %}plus-circle{% endif %} me-2"></i>
                {% if county %}Edit{% else %}Add{% endif %} County
            </h3>
            <a href="{% url 'settings:counties' %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="bi bi-geo-alt me-2"></i>County Details
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="code" class="form-label fw-semibold">County Code <span class="text-danger">*</span></label>
                            <input type="text" name="code" id="code" class="form-control" 
                                   value="{{ county.code|default:'' }}" 
                                   placeholder="e.g., 001" required>
                            <small class="text-muted">3-digit county code</small>
                        </div>
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-semibold">County Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" id="name" class="form-control" 
                                   value="{{ county.name|default:'' }}" 
                                   placeholder="e.g., Nairobi" required>
                        </div>
                        <div class="col-md-6">
                            <label for="headquarters" class="form-label fw-semibold">Headquarters</label>
                            <input type="text" name="headquarters" id="headquarters" class="form-control" 
                                   value="{{ county.headquarters|default:'' }}" 
                                   placeholder="e.g., Nairobi">
                        </div>
                        <div class="col-md-6">
                            <label for="region" class="form-label fw-semibold">Region</label>
                            <select name="region" id="region" class="form-select">
                                {% for code, name in regions %}
                                <option value="{{ code }}" {% if county and county.region == code %}selected{% endif %}>
                                    {{ name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="population" class="form-label fw-semibold">Population</label>
                            <input type="number" name="population" id="population" class="form-control" 
                                   value="{{ county.population|default:'' }}" 
                                   placeholder="e.g., 4393000">
                        </div>
                        <div class="col-md-6">
                            <label for="area_sq_km" class="form-label fw-semibold">Area (sq km)</label>
                            <input type="number" step="0.01" name="area_sq_km" id="area_sq_km" class="form-control" 
                                   value="{{ county.area_sq_km|default:'' }}" 
                                   placeholder="e.g., 696.1">
                        </div>
                        <div class="col-md-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" 
                                       {% if county and county.is_active or not county %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">Active</label>
                            </div>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-2"></i>{% if county %}Update{% else %}Add{% endif %} County
                        </button>
                        <a href="{% url 'settings:counties' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
